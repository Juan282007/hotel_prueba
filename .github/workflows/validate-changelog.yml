name: Validate Liquibase Changelogs

# Runs on pushes and pull requests to the main delivery branches.
on:
  push:
    branches: [dev, qa, main]
  pull_request:
    branches: [dev, qa, main]

jobs:
  validate-liquibase:
    name: Liquibase - Validate Changelogs
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hotel_system
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: abcd1234
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate changelog with Liquibase
        working-directory: entregables/estructura-base-datos
        run: |
          docker run --rm \
            --network host \
            -v "$(pwd):/liquibase/workspace" \
            -w /liquibase/workspace \
            liquibase/liquibase:4.25 \
            --url="jdbc:postgresql://localhost:5432/hotel_system" \
            --username="postgres" \
            --password="abcd1234" \
            --changeLogFile="changelog/changelog-master.yaml" \
            validate

      - name: Result
        if: success()
        run: echo "All changelogs are valid. The PR can be merged."